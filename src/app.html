<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="/logo-light.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700&family=Work+Sans:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				const THEME_KEY = 'darko-theme';
				var THEMES = ['black', 'dark', 'light', 'white'];
				try {
					var saved = localStorage.getItem(THEME_KEY);
					var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme = THEMES.indexOf(saved) !== -1 ? saved : (prefersDark ? 'dark' : 'white');
					document.documentElement.dataset.theme = theme;
				} catch (e) {
					document.documentElement.dataset.theme = 'white';
				}
				try {
					var FONT_KEY = 'darko-font';
					var FONTS = ['dm', 'inter', 'roboto', 'lato', 'opensans', 'sourcesans', 'nunito', 'worksans', 'raleway', 'outfit', 'jakarta', 'spacegrotesk', 'system'];
					var savedFont = localStorage.getItem(FONT_KEY);
					var font = FONTS.indexOf(savedFont) !== -1 ? savedFont : 'dm';
					document.documentElement.dataset.font = font;
				} catch (e) {
					document.documentElement.dataset.font = 'dm';
				}
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
